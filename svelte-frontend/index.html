<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp-Integrate — Phase 1 harness</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, sans-serif; margin: 0; display: grid;
             grid-template-columns: 340px 1fr; height: 100vh; }
      aside { padding: 16px; border-right: 1px solid #8883; overflow-y: auto; }
      main { padding: 16px; display: flex; flex-direction: column; min-width: 0; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      h2 { font-size: 13px; text-transform: uppercase; opacity: .6; margin: 18px 0 6px; }
      input, button { font: inherit; padding: 6px 8px; border-radius: 6px;
                      border: 1px solid #8886; background: transparent; color: inherit; }
      button { cursor: pointer; background: #25d36622; }
      button:hover { background: #25d36644; }
      .row { display: flex; gap: 6px; margin: 4px 0; }
      .row input { flex: 1; min-width: 0; }
      #status { font-size: 13px; line-height: 1.6; }
      #qr { margin-top: 8px; }
      #qr img { width: 220px; height: 220px; background: #fff; border-radius: 8px; }
      #log { flex: 1; overflow-y: auto; font-family: ui-monospace, monospace;
             font-size: 12px; white-space: pre-wrap; border: 1px solid #8883;
             border-radius: 8px; padding: 8px; }
      .ev { margin-bottom: 6px; border-bottom: 1px dashed #8882; padding-bottom: 6px; }
      .k { color: #25d366; font-weight: 600; }
    </style>
  </head>
  <body>
    <aside>
      <h1>WhatsApp-Integrate · Phase 1</h1>

      <h2>Status</h2>
      <div id="status">…</div>
      <div class="row"><button id="refresh">Refresh status</button></div>

      <h2>Pairing</h2>
      <div id="qr">Waiting for QR…</div>
      <div class="row">
        <input id="phone" placeholder="phone e.g. 15551234567" />
      </div>
      <div class="row">
        <input id="customCode" placeholder="custom code (optional)" />
        <button id="pair">Pair code</button>
      </div>

      <h2>Send</h2>
      <div class="row"><input id="toJid" placeholder="to JID …@s.whatsapp.net" /></div>
      <div class="row">
        <input id="text" placeholder="message" />
        <button id="send">Send</button>
      </div>
      <div class="row">
        <button id="markRead">Mark read</button>
        <button id="logout">Logout</button>
      </div>
    </aside>

    <main>
      <h2>Event stream (wa://event)</h2>
      <div id="log"></div>
    </main>

    <script>
      // withGlobalTauri = true exposes the API here without a bundler. Phase 2
      // replaces this static page with a Svelte app using @tauri-apps/api.
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      const $ = (id) => document.getElementById(id);
      const logEl = $("log");

      function log(kind, data) {
        const div = document.createElement("div");
        div.className = "ev";
        div.innerHTML =
          `<span class="k">${kind}</span>\n` +
          (typeof data === "string" ? data : JSON.stringify(data, null, 2));
        logEl.prepend(div);
      }

      async function refresh() {
        try {
          const s = await invoke("auth_status", {});
          $("status").textContent =
            `session: ${s.sessionId}\nloggedIn: ${s.loggedIn}\nconnected: ${s.connected}\njid: ${s.jid ?? "—"}`;
        } catch (e) { log("error: auth_status", e); }
      }

      function showQr(code) {
        if (!code) { $("qr").textContent = "QR event arrived without a code"; return; }
        // NOTE: external renderer (needs internet). Phase 2 should bundle an
        // offline QR lib. encodeURIComponent escapes the +,/,= in the ref.
        const url = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&qzone=2&data=" +
                    encodeURIComponent(code);
        $("qr").innerHTML =
          `<img alt="QR" src="${url}" /><div>Scan in WhatsApp → Linked Devices (auto-refreshes ~20s)</div>`;
      }

      // --- live event subscriptions ---
      listen("wa://event", (e) => log(e.payload.kind, e.payload.payload));
      // payload is the flattened {code, timeoutSecs}; fall back to the
      // externally-tagged shape just in case the bridge wasn't updated.
      listen("wa://auth/qr", (e) => {
        const p = e.payload.payload || {};
        showQr(p.code || (p.PairingQrCode && p.PairingQrCode.code));
      });
      listen("wa://auth/paired", () => { $("qr").textContent = "✅ paired"; refresh(); });
      listen("wa://conn/state", () => refresh());

      // --- buttons ---
      $("refresh").onclick = refresh;
      $("pair").onclick = async () => {
        try {
          const r = await invoke("auth_start_pair_code", {
            phone: $("phone").value.trim(),
            customCode: $("customCode").value.trim() || null,
          });
          log("pair code", r.code);
        } catch (e) { log("error: pair", e); }
      };
      $("send").onclick = async () => {
        try {
          const r = await invoke("send_text", {
            jid: $("toJid").value.trim(), text: $("text").value,
          });
          log("sent", r);
        } catch (e) { log("error: send", e); }
      };
      $("markRead").onclick = async () => {
        try { await invoke("mark_read", { jid: $("toJid").value.trim() }); log("mark_read", "ok"); }
        catch (e) { log("error: mark_read", e); }
      };
      $("logout").onclick = async () => {
        try { await invoke("auth_logout", {}); log("logout", "ok"); refresh(); }
        catch (e) { log("error: logout", e); }
      };

      // kick things off
      invoke("auth_start_qr", {}).catch((e) => log("error: start_qr", e));
      refresh();
    </script>
  </body>
</html>
