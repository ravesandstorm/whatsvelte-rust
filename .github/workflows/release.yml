name: Release Tauri App

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tags like v1.0.0

permissions:
  contents: write # Required to create the release and upload assets

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: ""
          - os: macos-latest
            target: ""
          - os: windows-latest
            target: "x86_64-pc-windows-msvc" # Standard 64-bit Windows
          - os: windows-latest
            target: "aarch64-pc-windows-msvc" # ARM64 Windows

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Linux-specific system dependencies required by Tauri/WebKit
      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          # Note: If you are using Tauri v1, change 'libwebkit2gtk-4.1-dev' to 'libwebkit2gtk-4.0-dev' above.

      # Install Node.js for Svelte compilation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm' # Automates npm caching

      # Clean install frontend dependencies
      - name: Install npm dependencies
        run: |
          npm ci
          cd svelte-frontend
          npm ci

      # Install Rust toolchain for the backend
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Speeds up subsequent Rust builds significantly
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Build Svelte + Rust and automatically attach binaries to the GitHub Release
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing + notarization. The .dmg is shipped ad-hoc signed
          # (see tauri.conf.json bundle.macOS.signingIdentity) until these repo
          # secrets are populated; once set, tauri-action signs with the Developer
          # ID and notarizes so Gatekeeper stops flagging the app as "damaged".
          # All are no-ops when empty, so Linux/Windows jobs are unaffected.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }} 
          # Use these credentials when you have a paid Apple certificate
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: 'Automated release generated by GitHub Actions.'
          releaseDraft: false
          prerelease: false
